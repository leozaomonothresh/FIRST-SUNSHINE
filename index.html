<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>...</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: black;
      color: white;
      font-family: monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .container {
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    .mostrar {
      opacity: 1;
    }

    input {
      padding: 12px;
      border-radius: 10px;
      border: none;
      text-align: center;
      margin-top: 20px;
      background: #111;
      color: white;
    }

    button {
      padding: 12px 25px;
      border-radius: 10px;
      border: none;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    #pergunta {
      margin-top: 20px;
      letter-spacing: 2px;
    }

    #erro {
      margin-top: 20px;
      color: #ff4d6d;
      min-height: 24px;
    }

    /* 🐒 */
    #macaco {
      position: absolute;
      font-size: 70px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
    }

    .pop {
      animation: pop 0.5s forwards;
    }

    .subir {
      animation: subir 3s ease forwards;
    }

    @keyframes pop {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      80% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes subir {
      to {
        transform: translate(-50%, -250%);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<div class="container" id="conteudo">

  <h2 id="titulo">ÁREA SECRETA</h2>

  <div id="senhaBox" style="display:none;">
    <p id="pergunta"></p>

    <input type="text" id="senha" placeholder="Digite a senha">
    <br>
    <button onclick="verificar()">Entrar</button>

    <p id="erro"></p>
  </div>

</div>

<div id="macaco">🐒</div>

<!-- SONS -->
<audio id="vento" loop>
  <source src="vento.mp3" type="audio/mpeg">
</audio>

<audio id="teclado">
  <source src="teclado.mp3" type="audio/mpeg">
</audio>

<script>

const container = document.getElementById("conteudo");
const titulo = document.getElementById("titulo");
const senhaBox = document.getElementById("senhaBox");
const pergunta = document.getElementById("pergunta");
const erro = document.getElementById("erro");
const macaco = document.getElementById("macaco");

const vento = document.getElementById("vento");
const teclado = document.getElementById("teclado");

// ENTER
document.getElementById("senha").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    verificar();
  }
});

// FADE IN
setTimeout(() => {
  container.classList.add("mostrar");
}, 500);

// SUMIR TÍTULO
setTimeout(() => {
  titulo.style.opacity = "0";
}, 2500);

// MOSTRAR SENHA
setTimeout(() => {
  titulo.style.display = "none";
  senhaBox.style.display = "block";

  vento.volume = 0.3;
  vento.play().catch(() => {});

  escreverTexto("O APELIDO QUE VOCE ODEIA");

}, 4000);


// DIGITA PERGUNTA
function escreverTexto(texto) {
  let i = 0;
  pergunta.innerHTML = "";

  function digitar() {
    if (i < texto.length) {
      pergunta.innerHTML += texto.charAt(i);

      teclado.currentTime = 0;
      teclado.play().catch(() => {});

      i++;
      setTimeout(digitar, 70);
    }
  }

  digitar();
}


// DIGITA ERRO
function escreverErro(texto) {
  let i = 0;
  erro.innerHTML = "";

  function digitar() {
    if (i < texto.length) {
      erro.innerHTML += texto.charAt(i);

      teclado.currentTime = 0;
      teclado.play().catch(() => {});

      i++;
      setTimeout(digitar, 50);
    }
  }

  digitar();
}


// VERIFICAÇÃO
function verificar() {
  var input = document.getElementById("senha");
  var senha = input.value.toLowerCase().trim();

  senha = senha.replace(/\s+/g, " ");

  if (senha === "macaquinha") {

    erro.innerHTML = "";

    // esconde interface
    container.style.display = "none";

    // inicia animação
    macaco.classList.add("pop");

    // quando terminar o POP → sobe
    macaco.addEventListener("animationend", function etapa1() {

      macaco.removeEventListener("animationend", etapa1);
      macaco.classList.add("subir");

      // quando terminar de subir → redireciona
      macaco.addEventListener("animationend", function etapa2() {
        window.location.href = "johhmayer.html";
      }, { once: true });

    });

  } else {

    escreverErro("voce sempre terá uma chance :)");
    input.value = "";
    input.focus();
  }
}

</script>

</body>
</html>
