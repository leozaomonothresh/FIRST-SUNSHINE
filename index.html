<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>...</title>

  <!-- FONTES -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: black;
      color: white;
      font-family: 'Share Tech Mono', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .container {
      opacity: 0;
      transition: opacity 1.5s ease;
      width: 90%;
      max-width: 500px;
    }

    .mostrar {
      opacity: 1;
    }

    h2 {
      font-family: 'Cinzel', serif;
      font-size: clamp(28px, 6vw, 48px);
      letter-spacing: 4px;
    }

    #pergunta {
      margin-top: 25px;
      font-size: clamp(16px, 4vw, 24px);
      letter-spacing: 2px;
    }

    input {
      padding: 14px;
      border-radius: 12px;
      border: none;
      text-align: center;
      margin-top: 25px;
      background: #111;
      color: white;
      width: 80%;
      font-size: clamp(16px, 4vw, 20px);
      font-family: 'Share Tech Mono', monospace;
    }

    button {
      padding: 14px 30px;
      border-radius: 12px;
      border: none;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      margin-top: 15px;
      font-size: clamp(16px, 4vw, 20px);
      font-family: 'Cinzel', serif;
      letter-spacing: 2px;
    }

    #erro {
      margin-top: 20px;
      color: #ff4d6d;
      min-height: 30px;
      font-size: clamp(14px, 3.5vw, 18px);
    }

    /* 🐒 */
    #macaco {
      position: absolute;
      font-size: clamp(60px, 14vw, 100px);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
    }

    .pop {
      animation: pop 0.5s forwards;
    }

    .subir {
      animation: subir 3s ease forwards;
    }

    @keyframes pop {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      80% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes subir {
      to {
        transform: translate(-50%, -250%);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<div class="container" id="conteudo">

  <h2 id="titulo">ÁREA SECRETA</h2>

  <div id="senhaBox" style="display:none;">
    <p id="pergunta"></p>

    <input type="text" id="senha" placeholder="Digite a senha">
    <br>
    <button onclick="verificar()">ENTRAR</button>

    <p id="erro"></p>
  </div>

</div>

<div id="macaco">🐒</div>

<!-- SONS -->
<audio id="vento" loop>
  <source src="vento.mp3" type="audio/mpeg">
</audio>

<audio id="teclado">
  <source src="teclado.mp3" type="audio/mpeg">
</audio>

<script>

const container = document.getElementById("conteudo");
const titulo = document.getElementById("titulo");
const senhaBox = document.getElementById("senhaBox");
const pergunta = document.getElementById("pergunta");
const erro = document.getElementById("erro");
const macaco = document.getElementById("macaco");

const vento = document.getElementById("vento");
const teclado = document.getElementById("teclado");

// ENTER
document.getElementById("senha").addEventListener("keydown", function(e) {
  if (e.key === "Enter") verificar();
});

// FADE IN
setTimeout(() => container.classList.add("mostrar"), 500);

// SUMIR TÍTULO
setTimeout(() => titulo.style.opacity = "0", 2500);

// MOSTRAR SENHA
setTimeout(() => {
  titulo.style.display = "none";
  senhaBox.style.display = "block";

  vento.volume = 0.3;
  vento.play().catch(() => {});

  escreverTexto("O APELIDO QUE VOCE ODEIA");
}, 4000);


// DIGITA PERGUNTA
function escreverTexto(texto) {
  let i = 0;
  pergunta.innerHTML = "";

  function digitar() {
    if (i < texto.length) {
      pergunta.innerHTML += texto[i];

      teclado.currentTime = 0;
      teclado.play().catch(() => {});

      i++;
      setTimeout(digitar, 70);
    }
  }

  digitar();
}


// DIGITA ERRO
function escreverErro(texto) {
  let i = 0;
  erro.innerHTML = "";

  function digitar() {
    if (i < texto.length) {
      erro.innerHTML += texto[i];

      teclado.currentTime = 0;
      teclado.play().catch(() => {});

      i++;
      setTimeout(digitar, 50);
    }
  }

  digitar();
}


// VERIFICAÇÃO
function verificar() {
  var input = document.getElementById("senha");
  var senha = input.value.toLowerCase().trim().replace(/\s+/g, " ");

  if (senha === "macaquinha") {

    erro.innerHTML = "";
    container.style.display = "none";

    macaco.classList.add("pop");

    macaco.addEventListener("animationend", function etapa1() {
      macaco.removeEventListener("animationend", etapa1);
      macaco.classList.add("subir");

      macaco.addEventListener("animationend", () => {
        window.location.href = "johhmayer.html";
      }, { once: true });

    });

  } else {

    escreverErro("voce sempre terá uma chance :)");
    input.value = "";
    input.focus();
  }
}

</script>

</body>
</html>
