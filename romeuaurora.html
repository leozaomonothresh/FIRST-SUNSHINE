<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>...</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: black;
      color: white;
      font-family: monospace;

      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .mensagem {
      font-size: clamp(22px, 6vw, 40px);
      letter-spacing: 4px;

      opacity: 0;
      animation: aparecer 2s ease forwards;
    }

    @keyframes aparecer {
      to {
        opacity: 1;
      }
    }
  </style>
</head>

<body>

<div class="mensagem">
  SOMENTE EU TENHO A SENHA!
</div>

</body>
</html>
