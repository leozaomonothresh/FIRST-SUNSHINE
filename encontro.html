<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>❤️</title>

  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: sans-serif;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #container {
      text-align: center;
    }

    input {
      padding: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      text-align: center;
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    #mensagemFinal {
      font-size: 40px;
      color: #ff4d6d;
    }
  </style>
</head>

<body>

<div id="container">

  <h2>🔐 Última Charada</h2>
  <p><i>De quem eu sou?</i></p>

  <input type="text" id="senha" placeholder="Digite a resposta">
  <br>
  <button onclick="verificar()">Entrar</button>

</div>

<script>
  function verificar() {
    var senha = document.getElementById("senha").value
      .toLowerCase()
      .trim();

    senha = senha.replace(/\s+/g, " ");

    if (senha === "meu") {
      // apaga tudo da tela
      document.getElementById("container").innerHTML = 
        "<p id='mensagemFinal'>Eu te amo ❤️</p>";
    } else {
      alert("Você sempre terá uma chance.");
      document.getElementById("senha").value = "";
    }
  }
</script>

</body>
</html>
