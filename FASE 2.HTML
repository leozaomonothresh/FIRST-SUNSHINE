<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Nova pista 🔐</title>

  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      background: #0f0f0f;
      color: white;
      margin-top: 100px;
    }

    input {
      padding: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      text-align: center;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #ff1f4b;
    }

    #mensagem {
      margin-top: 20px;
      color: #ff8080;
    }
  </style>
</head>

<body>

  <h2>🔐 Segunda Resposta</h2>
  <p>Dica: <i>Qual queijo ia no creme do lanche mais gostoso já feito?</i></p>

  <input type="text" id="senha" placeholder="Digite a senha">
  <br>
  <button onclick="verificar()">Entrar</button>

  <p id="mensagem"></p>

  <script>
    function verificar() {
      var senha = document.getElementById("senha").value;

      if (senha.toLowerCase() === "gorgonzola") {
        window.location.href = "fase3.html";
      } else {
        document.getElementById("mensagem").innerText = "Você sempre terá uma chance.";
        document.getElementById("senha").value = "";
      }
    }
  </script>

</body>
</html>
